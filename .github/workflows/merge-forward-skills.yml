name: Sync Fork with Upstream

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC; adjust as needed
  workflow_dispatch:     # Lets you trigger manually from Actions tab

permissions:
  contents: write        # Needed to push to your repo

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0     # Full history for merge/rebase

      - name: Set up upstream remote
        run: git remote add upstream https://github.com/qwibitai/nanoclaw.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Merge upstream main into your main
        run: |
          git checkout main
          git merge upstream/main --allow-unrelated-histories || true  # Continue even if conflicts
          git push origin main

      # Optional: If you prefer rebase (cleaner history, but riskier with conflicts)
      # run: |
      #   git checkout main
      #   git rebase upstream/main
      #   git push --force-with-lease origin main
